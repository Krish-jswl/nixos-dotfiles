# BACKGROUND
background {
    monitor =
    path = screenshot

    blur_passes = 4
    contrast = 1
    brightness = 0.65
    vibrancy = 0.10
    vibrancy_darkness = 0.20
}

# GENERAL
general {
    hide_cursor = true
    ignore_empty_input = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 180, 55

    outline_thickness = 2

    dots_size = 0.4
    dots_spacing = 0.35
    dots_center = true

    outer_color = rgba(83c092ee)
    inner_color = rgba(272e33dd)

    font_color = rgb(d3c6aa)

    font_family = JetBrainsMono Nerd Font Mono

    fade_on_empty = true
    rounding = 12

    check_color = rgb(7fbbb3)

    fail_text = Wrong password
    fail_color = rgb(e67e80)

    placeholder_text = Enter password
    placeholder_color = rgb(859289)

    hide_input = false

    position = 0, -580
    halign = center
    valign = center
}

# TIME
label {
    monitor =

    text = cmd[update:1000] echo "$(date +'%H:%M')"

    color = rgba(d3c6aaee)

    font_size = 300
    font_family = JetBrainsMono Nerd Font

    halign = center
    valign = center
}
