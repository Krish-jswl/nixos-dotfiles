# BACKGROUND
background {
    monitor =
    path = screenshot

    blur_passes = 2
    contrast = 1
    brightness = 0.75
    vibrancy = 0.15
    vibrancy_darkness = 0.25
}

# GENERAL
general {
    hide_cursor = true
    ignore_empty_input = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 180, 55

    outline_thickness = 2

    dots_size = 0.4
    dots_spacing = 0.35
    dots_center = true

    outer_color = rgba(129, 162, 190, 0.90)
    inner_color = rgba(40, 42, 46, 0.85)

    font_color = rgb(197, 200, 198)

    font_family = JetBrainsMono Nerd Font Mono

    fade_on_empty = true
    rounding = 12

    check_color = rgb(181, 189, 104)

    fail_text = <span foreground="#cc6666">Wrong password</span>
    placeholder_text = <span foreground="#969896">Enter password</span>

    hide_input = false

    position = 0, -580
    halign = center
    valign = center
}

# TIME
label {
    monitor =

    text = cmd[update:1000] echo "$(date +'%H:%M')"

    color = rgba(197, 200, 198, 0.95)

    font_size = 300
    font_family = JetBrainsMono Nerd Font

    halign = center
    valign = center
}
